AWSTemplateFormatVersion: '2010-09-09'
Description: 'TwinMind AI - Complete AWS Infrastructure Stack'

Parameters:
  ProjectName:
    Type: String
    Default: twinmind
    Description: Project name for resource naming
  
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name

Resources:
  # ============================================================================
  # DynamoDB Table for Events
  # ============================================================================
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-events-${Environment}'
      BillingMode: PAY_PER_REQUEST  # On-demand pricing for auto-scaling
      AttributeDefinitions:
        - AttributeName: machine_id
          AttributeType: S
        - AttributeName: ts
          AttributeType: N
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: machine_id
          KeyType: HASH
        - AttributeName: ts
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-ts-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: ts
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
  # S3 Bucket for ML Models
  # ============================================================================
  MLModelsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-ml-models-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
  # S3 Bucket for Frame Images
  # ============================================================================
  FramesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-frames-${Environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 3600
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  FramesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FramesBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${FramesBucket.Arn}/*'

  # ============================================================================
  # IAM Role for Backend Application
  # ============================================================================
  BackendAppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-backend-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt EventsTable.Arn
                  - !Sub '${EventsTable.Arn}/index/*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt MLModelsBucket.Arn
                  - !Sub '${MLModelsBucket.Arn}/*'
                  - !GetAtt FramesBucket.Arn
                  - !Sub '${FramesBucket.Arn}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
  # IAM User for Local Development
  # ============================================================================
  DeveloperUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub '${ProjectName}-developer-${Environment}'
      Policies:
        - PolicyName: TwinMindDeveloperAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:*
                Resource:
                  - !GetAtt EventsTable.Arn
                  - !Sub '${EventsTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !GetAtt MLModelsBucket.Arn
                  - !Sub '${MLModelsBucket.Arn}/*'
                  - !GetAtt FramesBucket.Arn
                  - !Sub '${FramesBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DeveloperAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref DeveloperUser

  # ============================================================================
  # CloudWatch Log Group
  # ============================================================================
  ApplicationLogGroup:
    Type: AWS::CloudFormation::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/${ProjectName}/${Environment}/application'
      RetentionInDays: 30

  # ============================================================================
  # Secrets Manager for API Keys
  # ============================================================================
  APIKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/api-keys'
      Description: API keys for TwinMind AI (Gemini, Polygon, etc.)
      SecretString: !Sub |
        {
          "GEMINI_API_KEY": "your_gemini_api_key_here",
          "POLYGON_RPC_URL": "https://rpc-mumbai.maticvigil.com/",
          "CONTRACT_ADDRESS": "0x_deploy_your_contract_first",
          "WALLET_PRIVATE_KEY": "0x_use_throwaway_wallet_only"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DynamoDBTableName:
    Description: DynamoDB Events Table Name
    Value: !Ref EventsTable
    Export:
      Name: !Sub '${AWS::StackName}-EventsTable'

  DynamoDBTableArn:
    Description: DynamoDB Events Table ARN
    Value: !GetAtt EventsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventsTableArn'

  MLModelsBucketName:
    Description: S3 Bucket for ML Models
    Value: !Ref MLModelsBucket
    Export:
      Name: !Sub '${AWS::StackName}-MLModelsBucket'

  FramesBucketName:
    Description: S3 Bucket for Frame Images
    Value: !Ref FramesBucket
    Export:
      Name: !Sub '${AWS::StackName}-FramesBucket'

  FramesBucketURL:
    Description: Public URL for Frames Bucket
    Value: !Sub 'https://${FramesBucket}.s3.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-FramesBucketURL'

  BackendRoleArn:
    Description: IAM Role ARN for Backend Application
    Value: !GetAtt BackendAppRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BackendRoleArn'

  DeveloperAccessKeyId:
    Description: Access Key ID for Developer User
    Value: !Ref DeveloperAccessKey

  DeveloperSecretAccessKey:
    Description: Secret Access Key for Developer User (Store securely!)
    Value: !GetAtt DeveloperAccessKey.SecretAccessKey

  SecretsManagerArn:
    Description: Secrets Manager ARN for API Keys
    Value: !Ref APIKeysSecret
    Export:
      Name: !Sub '${AWS::StackName}-APIKeysSecret'

  Region:
    Description: AWS Region
    Value: !Ref AWS::Region

  AccountId:
    Description: AWS Account ID
    Value: !Ref AWS::AccountId
